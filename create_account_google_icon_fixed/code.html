<body class="font-body selection:bg-primary/20">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl shadow-sm flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-slate-500 active:scale-95 transition-transform duration-200" style="">
<span class="material-symbols-outlined" data-icon="arrow_back" style="">arrow_back</span>
</button>
<span class="text-xl font-bold tracking-tighter text-blue-700 font-headline" style="">StudentConnect</span>
</div>
<div class="flex items-center gap-4">
<span class="text-blue-800 font-bold font-headline text-sm" style="">login<br/></span>
</div>
</header>
<main class="min-h-screen pt-24 px-6 max-w-lg mx-auto pb-12">
<!-- Brand Identity Section -->
<section class="flex flex-col items-center mb-12">
<div class="mb-8 p-1 bg-surface-container-low rounded-3xl">
<img alt="University Logo" class="w-20 h-20 object-cover rounded-[1.5rem]" data-alt="Minimalist black graduation cap icon with Arabic text 'جامعتك' (Your University) on a light blue gradient background." src="https://lh3.googleusercontent.com/aida/ADBb0uiW6r2IGRka20MZ6zymoT_Cx2xq9v5HVbjHWNCvjY-UlkrIZtStPedXcv2junx_B-uZdyPEvTiKNE9yHLMAQKYjur8r34BUDp8DhTEBV8GXnftbXmqzSl0fD_TFc-PVAwKeuEn9UiSFCE67oRm4cjZDuJzGJjxVVvxwMtTNeQ9QseheKi__T0iuFLjejYaH1dSiING8XBksJcXsQfJ8uhLt0gu5umSy9utsKOa1AakwRAVjW3N2Ml3TdiHBayj9VSC1Ho_2G-x6LQ" style=""/>
</div>
<h1 class="font-headline text-3xl font-bold text-center mb-4 tracking-tight leading-tight" style="">Create your scholarly profile.</h1>
<div class="bg-secondary-container/20 px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="info" style='font-variation-settings: "FILL" 1;'>info</span>
<p class="text-on-secondary-container text-xs font-medium" style="">Only @gmail.com accounts are permitted.</p>
</div>
</section>
<!-- Registration Form -->
<form class="space-y-8">
<div class="space-y-6">
<!-- Full Name -->
<div class="group">
<label class="block font-label text-[0.6875rem] font-medium text-outline mb-2 px-4 uppercase tracking-widest" style="">Full Name</label>
<div class="relative">
<input class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-sm placeholder:text-slate-400" placeholder="Alex Sterling" type="text"/>
</div>
</div>
<!-- Gmail Address -->
<div class="group">
<label class="block font-label text-[0.6875rem] font-medium text-outline mb-2 px-4 uppercase tracking-widest" style="">Gmail Address</label>
<div class="relative">
<input class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-sm placeholder:text-slate-400" placeholder="username@gmail.com" type="email"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-slate-400 text-lg" data-icon="mail" style="">mail</span>
</div>
</div>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="group">
<label class="block font-label text-[0.6875rem] font-medium text-outline mb-2 px-4 uppercase tracking-widest" style="">Create Password</label>
<input class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-sm" placeholder="••••••••" type="password"/>
</div>
<div class="group">
<label class="block font-label text-[0.6875rem] font-medium text-outline mb-2 px-4 uppercase tracking-widest" style="">Confirm Password</label>
<input class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Actions -->
<div class="space-y-4 pt-4">
<button class="fluid-gradient-btn w-full h-16 rounded-full text-white font-headline font-bold text-lg shadow-lg active:scale-[0.97] transition-all flex items-center justify-center gap-2" style="" type="submit">
<span class="" style="">Create My Account</span>
<span class="material-symbols-outlined" data-icon="arrow_forward" style="">arrow_forward</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="flex-1 h-px bg-surface-container"></div>
<span class="font-label text-xs text-outline uppercase tracking-widest" style="">Or continue with</span>
<div class="flex-1 h-px bg-surface-container"></div>
</div>
<button class="w-full h-16 rounded-full bg-surface-container-lowest border border-outline-variant/10 shadow-sm active:scale-[0.97] transition-all flex items-center justify-center gap-3 group" style="" type="button">
<img alt="Google Logo" class="w-6 h-6 object-contain transition-all" data-alt="official google logo icon on a white background" src="https://lh3.googleusercontent.com/aida-public/AK-R2v3iC9-tUqV2kPZt0w6KxO2xQ-f5I8rWqU1vR4V-2W4u8YqW1vR4V-2W4u8Yq" style=""/>
<span class="font-headline font-semibold text-on-surface" style="">Sign up with Google</span>
</button>
</div>
</form>
<p class="mt-12 text-center font-body text-sm text-outline" style="">
            Already have an account? <a class="text-primary font-bold hover:underline" href="#" style="">Log in</a>
</p>
</main>
<!-- BottomNavBar -->
</body></html>
